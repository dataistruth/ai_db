resources:
  jobs:
    bronze_job:
      name: bronze_job

      # ── Step 1: Define named environment at job level ──────────
      environments:
        - environment_key: my_env
          spec:
            client: "3"
            dependencies:
              - /Volumes/db/bronze/libs/platform_libs/common_utils-1.0.0-py3-none-any.whl

      tasks:
        - task_key: bronze_task
          # ── Step 2: Reference it in the task ───────────────────
          environment_key: my_env

          notebook_task:
            notebook_path: ../src/bronze/pipelines/ingest_bronze.py
            base_parameters:
              config: config/bronze_ingestion.json
              catalog: ${var.catalog}
              schema:  ${var.schema_bronze}

      serverless: true