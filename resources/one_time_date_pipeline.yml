resources:
  pipelines:
    one_time_date_pipeline:
      name: one_time_date_pipeline_${var.env}_${var.developer}
      description: "Create d_date dimension — ${var.env}"

      catalog: ${var.catalog}
      target:  ${var.schema_silver}

      serverless: true        # ← indented under pipeline ✅
      environment:
        dependencies:
          - ${var.libs_volume}/common_utils-1.0.0-py3-none-any.whl

      configuration:          # ← indented under pipeline ✅
        bundle.catalog:       ${var.catalog}
        bundle.env:           ${var.env}
        bundle.developer:     ${var.developer}
        bundle.schema.bronze: ${var.schema_bronze}
        bundle.schema.silver: ${var.schema_silver}
        bundle.schema.gold:   ${var.schema_gold}
        bundle.sourcePath:    ${workspace.file_path}

      libraries:              # ← indented under pipeline ✅
        - notebook:
            path: ../src/silver/pipelines/generate_date.py


      channel: CURRENT        # ← indented under pipeline ✅
      continuous: false       # ← indented under pipeline ✅