resources:
  pipelines:
    onetime_date_pipeline:
      name: onetime_date_pipeline_${var.env}_${var.developer}
      description: " Runs the date creation DLT pipeline — ${var.env}"

      catalog: ${var.catalog}
      target:  ${var.schema_silver}        # schema where DLT publishes tables

      serverless: true
      environments:
        - environment_key: my_env
          spec:
            environment_version: "3"
            dependencies:
              - /Volumes/${var.catalog}/${var.schema_bronze}/libs/platform_libs/common_utils-0.1.0-py3-none-any.whl
      # ── bundle-injected spark conf ─────────────────────────────────
      configuration:
        bundle.catalog:       ${var.catalog}
        bundle.env:           ${var.env}
        bundle.developer:     ${var.developer}
        bundle.schema.bronze: ${var.schema_bronze}
        bundle.schema.silver: ${var.schema_silver}
        bundle.schema.gold:   ${var.schema_gold}
        bundle.sourcePath: ${workspace.file_path}

      # ── libraries ──────────────────────────────────────────────────
      libraries:
        - notebook:
            path: ../src/silver/pipelines/generate_date.py
        - whl:
            artifact: common_utils_lib        # DAB resolves path automatically

      # ── channel ────────────────────────────────────────────────────
      channel: CURRENT

      # ── continuous vs triggered ────────────────────────────────────
      continuous: false                       # triggered mode — job controls it