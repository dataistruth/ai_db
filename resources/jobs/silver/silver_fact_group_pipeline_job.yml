resources:
  jobs:
    silver_claim_daily_job:
      name: silver_claim_daily_job_${var.env}_${var.developer}
      tags:
        env:       ${var.env}
        developer: ${var.developer}
        layer:     silver

      max_concurrent_runs: 1          # ← only one run at a time

      tasks:
        - task_key: run_silver_claim_daily
          pipeline_task:
            pipeline_id: ${resources.pipelines.silver_claim_daily.id}
            full_refresh: false

          max_retries: 0              # ← no job level retry