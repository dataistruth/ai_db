resources:
  pipelines:
    silver_claim_daily:
      name: silver_claim_daily_${var.env}_${var.developer}
      description: " silver_claim_daily DLT pipeline — ${var.env}"

      catalog: ${var.catalog}
      target:  ${var.schema_silver}       # schema where DLT publishes tables

      serverless: true
      environment:
          dependencies:
            - ${var.libs_volume}/common_utils-1.0.0-py3-none-any.whl
      # ── bundle-injected spark conf ─────────────────────────────────
      configuration:
        bundle.catalog:       ${var.catalog}
        bundle.env:           ${var.env}
        bundle.developer:     ${var.developer}
        bundle.schema.bronze: ${var.schema_bronze}
        bundle.schema.silver: ${var.schema_silver}
        bundle.schema.gold:   ${var.schema_silver}
        bundle.sourcePath: ${workspace.file_path}

      # ── libraries ──────────────────────────────────────────────────
      libraries:
        - notebook:
            path: ../src/silver/pipelines/pipeline_claim_group.py
        - whl:
            artifact: common_utils_lib        # DAB resolves path automatically

      # ── channel ────────────────────────────────────────────────────
      channel: CURRENT

      # ── continuous vs triggered ────────────────────────────────────
      continuous: false                       # triggered mode — job controls it