bundle:
  name: ai_db

# ── include all resource yml files ───────────────────────────────────────
include:
  - resources/*.yml
  - resources/*/*.yml
  - jobs/*.yml
  - jobs/*/*.yml

artifacts:
  common_utils_lib:
    type: whl
    path: ../common_utils    # relative path to the library
    build: poetry build

# ── global variables ──────────────────────────────────────────────────────
variables:

  catalog:
    description: Unity Catalog name
    default: ai_db

  env:
    description: Deployment environment
    default: dev

  developer:
    description: Developer short name — used for schema isolation in dev
    default: shared              # qa and prod use shared schemas


  src_path:
      default: ${workspace.file_path}/src

  libs_volume:
    description: UC Volume path for shared libraries
    default: /Volumes/ai_dev_db/dev_msingh_bronze/libs/platform_libs

  gold_schema:
    description: "Gold layer schema name"
    default: gold

  silver_schema:
      description: "Silver layer schema name"
      default: silver

  bronze_schema:
      description: "Bronze layer schema name"
      default: bronze

  warehouse_http_path:
    default: "/sql/1.0/warehouses/00d71a4889fb3e3c"



# ── targets ───────────────────────────────────────────────────────────────
targets:

  dev:
    default: true
    mode: development
    workspace:
      profile: dev_w
    variables:
      catalog: ai_dev_db
      libs_volume: /Volumes/ai_dev_db/dev_msingh_bronze/libs/platform_libs
      env: dev
      developer: ${workspace.current_user.short_name}   # each dev gets own schema
      gold_schema : dev_msingh_gold
      silver_schema: dev_msingh_silver
      bronze_schema: dev_msingh_bronze

  qa:
    mode: production
    workspace:
      profile: qa_w
    variables:
      catalog: ai_qa_db
      libs_volume: /Volumes/ai_qa_db/shared/libs/platform_libs
      env: qa
      developer: shared          # shared schemas in qa

  prod:
    mode: production
    workspace:
      profile: prod_w
    variables:
      libs_volume: /Volumes/ai_db/shared/libs/platform_libs
      catalog: ai_db
      env: prod
      developer: shared          # shared schemas in prod

# ── sync local files to workspace ────────────────────────────────────────
sync:
  paths:
    - src
    - config
    - resources