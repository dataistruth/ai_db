bundle:
  name: ai

# ── include all resource yml files ───────────────────────────────────────
include:
  - resources/*.yml
  - jobs/*.yml
  - jobs/*/*.yml

artifacts:
  common_utils_lib:
    type: whl
    path: ../common_utils    # relative path to the library
    build: poetry build

# ── global variables ──────────────────────────────────────────────────────
variables:

  catalog:
    description: Unity Catalog name
    default: db

  env:
    description: Deployment environment
    default: dev

  developer:
    description: Developer short name — used for schema isolation in dev
    default: shared              # qa and prod use shared schemas


  src_path:
      default: ${workspace.file_path}/src

  libs_volume:
    description: UC Volume path for shared libraries
    default: /Volumes/db/bronze/libs/platform_libs

  schema_bronze:
    description: Bronze schema
    default: bronze

  schema_silver:
      description: Silver schema
      default: silver

  schema_gold:
      description: Gold schema
      default: gold

  warehouse_http_path:
      description: "SQL Warehouse HTTP path for gold MV execution"
      default: ""



# ── targets ───────────────────────────────────────────────────────────────
targets:

  dev:
    default: true
    mode: development
    workspace:
      profile: dev_w
    variables:
      catalog: dev_db
      libs_volume: /Volumes/ai_dev_db/dev_msingh_bronze/libs/platform_libs
      env: dev
      developer: ${workspace.current_user.short_name}
      schema_bronze: dev_${workspace.current_user.short_name}_bronze
      schema_silver: dev_${workspace.current_user.short_name}_silver
      schema_gold: dev_${workspace.current_user.short_name}_gold# each dev gets own schema

  qa:
    mode: production
    workspace:
      profile: qa_w
    variables:
      catalog: ai_qa_db
      libs_volume: /Volumes/ai_qa_db/shared/libs/platform_libs
      env: qa
      developer: shared          # shared schemas in qa

  prod:
    mode: production
    workspace:
      profile: prod_w
      root_path: /Workspace/Users/msingh.chicago26@protonmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      libs_volume: /Volumes/db/bronze/libs/platform_libs
      catalog: db
      env: prod
      developer: shared
      schema_bronze: bronze
      schema_silver: silver
      schema_gold: gold
      warehouse_http_path : "/sql/1.0/warehouses/84c0aa3ea1852c0a"
      # shared schemas in prod

# ── sync local files to workspace ────────────────────────────────────────
sync:
  paths:
    - src
    - config
    - resources